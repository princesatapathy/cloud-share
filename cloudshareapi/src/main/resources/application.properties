spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cloudshare}

server.servlet.context-path=/api/v1.0

#spring.data.mongodb.auto-index-creation=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

clerk.issuer=${CLERK_ISSUER:https://cool-snipe-97.clerk.accounts.dev}
clerk.jwks-url=${CLERK_JWKS_URL:https://cool-snipe-97.clerk.accounts.dev/.well-known/jwks.json}
clerk.webhook.secret=${CLERK_WEBHOOK_SECRET:}

#file upload configuration
app.upload-dir=${APP_UPLOAD_DIR:upload}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

#razorpay configuration
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
